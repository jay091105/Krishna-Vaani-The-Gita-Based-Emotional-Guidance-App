name: CI - Build Docker Images

# Trigger on push to main and pull requests to main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Step 2: Set up Docker Buildx for advanced Docker build capabilities
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # Step 3: Build backend Docker image
      # Builds the Python Flask backend with the ML model
      # Does NOT push to registry - this is a validation build only
      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: krishna-vaani-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # Step 4: Build frontend Docker image
      # Builds the React app with production optimizations
      # Does NOT push to registry - this is a validation build only
      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: krishna-vaani-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
